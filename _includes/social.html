<ul>
    {% assign links = site.social-links %}
    {% for link in links %}
        {% assign default-icon-class = "fab fa-2x fa-" | append: link.name %}
        <li>
          <a class="{{ link.icon-class | default: default-icon-class }}" href="{{ link.external-url | default: link.internal-url | absolute_url }}"></a>
        </li>
    {% endfor %}
</ul>
